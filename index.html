<!DOCTYPE html>
<html>
<head>
    <title>Admin Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#111;color:#0ff;padding:20px;font-family:sans-serif;">
    <h1>🧪 Test Admin Milimar</h1>
    <button id="connectBtn" style="width:100%;padding:15px;background:transparent;border:2px solid cyan;color:cyan;border-radius:30px;">🔌 CONECTAR</button>
    <div id="info" style="margin:20px 0;padding:10px;border:1px solid magenta;color:white;"></div>
    <div id="adminPanel" style="display:none;">
        <button onclick="ejecutarPausa()" style="width:100%;padding:15px;margin:5px 0;background:transparent;border:2px solid cyan;color:cyan;border-radius:30px;">⏸️ PAUSAR</button>
        <button onclick="ejecutarCupos()" style="width:100%;padding:15px;margin:5px 0;background:transparent;border:2px solid cyan;color:cyan;border-radius:30px;">🎫 CUPOS</button>
        <button onclick="ejecutarPremiar()" style="width:100%;padding:15px;margin:5px 0;background:transparent;border:2px solid cyan;color:cyan;border-radius:30px;">🏆 PREMIAR</button>
        <button onclick="ejecutarSolidaridad()" style="width:100%;padding:15px;margin:5px 0;background:transparent;border:2px solid cyan;color:cyan;border-radius:30px;">🤝 F. SOL.</button>
    </div>

    <script>
        const CONTRACT_ADDR = "0x35425E6416f799C30938cBc159523B43C1c358B2";
        const BSC_CHAIN_ID = 56;

        const abi = [
            "function owner() view returns (address)",
            "function togglePausa() external",
            "function otorgarCuposExtra(address,uint256) external",
            "function premiarLider(address,uint256) external",
            "function usarFondoSolidaridad(address,uint256,string memory) external"
        ];

        let provider, signer, userAddress, contract;

        const connectBtn = document.getElementById('connectBtn');
        const infoDiv = document.getElementById('info');
        const adminPanel = document.getElementById('adminPanel');

        function mostrar(msg) {
            alert(msg);
            infoDiv.innerText = msg;
        }

        connectBtn.onclick = async () => {
            if (!window.ethereum) {
                mostrar('❌ Instala MetaMask');
                return;
            }
            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                const network = await provider.getNetwork();
                if (network.chainId !== BSC_CHAIN_ID) {
                    try {
                        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });
                        provider = new ethers.providers.Web3Provider(window.ethereum);
                        signer = provider.getSigner();
                        userAddress = await signer.getAddress();
                    } catch {
                        mostrar('❌ Cambia a BSC Mainnet');
                        return;
                    }
                }

                contract = new ethers.Contract(CONTRACT_ADDR, abi, signer);
                const owner = await contract.owner();
                if (owner.toLowerCase() === userAddress.toLowerCase()) {
                    adminPanel.style.display = 'block';
                    mostrar('✅ Eres owner. Botones listos.');
                } else {
                    mostrar('❌ No eres owner');
                }
            } catch (e) {
                mostrar('❌ Error: ' + e.message);
            }
        };

        // Funciones llamadas desde los botones (onclick)
        window.ejecutarPausa = async function() {
            alert('1. Click en PAUSAR');
            if (!contract) { alert('Conecta primero'); return; }
            try {
                alert('2. Enviando transacción...');
                const tx = await contract.togglePausa();
                alert('3. Tx enviada: ' + tx.hash);
                await tx.wait();
                alert('4. ✅ Transacción confirmada');
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        };

        window.ejecutarCupos = function() {
            alert('Click en CUPOS');
            let lider = prompt('Dirección del líder:');
            if (!lider) return;
            let cant = prompt('Cantidad de cupos:');
            if (!cant) return;
            alert('Llamando a otorgarCuposExtra...');
            // Aquí iría la llamada real, pero por ahora solo probamos el flujo
            alert('Funcionalidad no implementada en esta prueba');
        };

        window.ejecutarPremiar = function() {
            alert('Click en PREMIAR');
            let lider = prompt('Dirección del líder:');
            if (!lider) return;
            let monto = prompt('Monto en USDT:');
            if (!monto) return;
            alert('Llamando a premiarLider...');
        };

        window.ejecutarSolidaridad = function() {
            alert('Click en F. SOL.');
            let benef = prompt('Dirección del beneficiario:');
            if (!benef) return;
            let monto = prompt('Monto en USDT:');
            if (!monto) return;
            let motivo = prompt('Motivo:');
            if (!motivo) return;
            alert('Llamando a usarFondoSolidaridad...');
        };
    </script>
</body>
</html>
